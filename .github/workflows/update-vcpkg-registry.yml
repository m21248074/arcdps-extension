# ============================================================
# .github/workflows/publish-vcpkg.yml
#
# Drop this file into every library repo unchanged — no
# configuration needed. The port name and version are read
# directly from vcpkg.json. All logic lives in the registry's
# composite action.
# ============================================================

name: Publish to vcpkg registry

on:
  push:
    branches: [main]
    paths: ['vcpkg.json']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the git tag

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2  # action needs HEAD~1 to detect version change

      - uses: Zinn-o-Matics/vcpkg-registry/.github/actions/publish-port@main
        with:
          registry-pat: ${{ secrets.REGISTRY_PAT }}
